<section id="hero-section" class="relative h-screen w-full flex items-center justify-center bg-[#612626] text-white overflow-hidden p-6 md:p-10 font-sans">
  
  <div #fondoMarron 
       class="absolute inset-0 bg-[#441313] origin-bottom-left z-0" 
       style="clip-path: polygon(0% 0%, 100% 100%, 0% 70%);">
  </div>

  <nav class="absolute left-25 md:left-10 top-10 md:top-1/2 md:-translate-y-1/2 flex md:flex-col gap-4 z-50 text-white overflow-x-auto max-w-full">
    @for (item of secciones; track item.id) {
      <a [href]="item.link" class="group flex items-center gap-2 md:gap-4 transition-all duration-300">
        <span class="text-[8px] md:text-[10px] font-mono opacity-50">{{ item.id }}</span>
        <span class="text-[8px] md:text-[10px] uppercase tracking-[0.2em] md:tracking-[0.3em] opacity-40 group-hover:opacity-100 whitespace-nowrap">
          {{ item.nombre }}
        </span>
        <div class="hidden md:block h-[1px] w-4 bg-white/20 group-hover:w-8 group-hover:bg-white transition-all"></div>
      </a>
    }
  </nav>

  <div class="text-center z-10 w-full px-4">
    <h1 #titulo class="text-[clamp(2.5rem,15vw,12rem)] md:text-[clamp(3rem,18vw,12rem)] font-black leading-[0.85] md:leading-[0.8] tracking-tighter uppercase">
      Design<br>Developer
    </h1>
    
    <div #subtitulo class="mt-6 md:mt-8 flex flex-col md:flex-row items-center justify-center gap-2 md:gap-4 text-white/50">
      <span class="text-[10px] md:text-xs tracking-[0.2em] md:tracking-[0.3em] uppercase">Portfolio 2026</span>
      <span class="hidden md:block text-white/20">—</span>
      <span class="text-[10px] md:text-xs tracking-[0.2em] md:tracking-[0.3em] uppercase">SILVIA TOVAR</span>
    </div>
  </div>

  <div class="hidden sm:block absolute right-6 md:right-10 bottom-6 md:bottom-10 [writing-mode:vertical-rl] text-[8px] md:text-[10px] tracking-[0.5em] uppercase opacity-20 z-10">
    Scroll para explorar —
  </div>
</section>
