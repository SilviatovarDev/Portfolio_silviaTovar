<section id="proyectos" class="relative bg-[#612626] text-white py-20 md:py-25 px-6 md:px-15 min-h-screen overflow-hidden">
  <div class="background-image"></div>

  <h2 class="text-[10px] tracking-[0.5em] uppercase opacity-30 mb-12 md:mb-20">PROJECTS</h2>

  <div class="flex flex-col border-t border-white/10">
    @for (proy of listaProyectos; track proy.id) {
      <a 
        [href]="proy.url" 
        target="_blank" 
        rel="noopener noreferrer"
        class="group relative border-b border-white/10 py-8 md:py-12 flex flex-col md:flex-row items-start md:items-center justify-between cursor-pointer transition-all duration-500 hover:md:px-6 block"
      >
        <div class="z-10 mb-4 md:mb-0">
          <span class="text-[10px] md:text-xs font-mono opacity-30 group-hover:opacity-100 transition-opacity">
            {{ proy.id }}
          </span>
          <h3 class="text-4xl sm:text-5xl md:text-8xl font-black uppercase tracking-tighter transition-all group-hover:italic leading-none">
            {{ proy.nombre }}
          </h3>
        </div>

        <div class="flex flex-col items-start md:items-end gap-3 md:gap-4 z-10">
          <span class="text-[10px] md:text-xs tracking-widest uppercase opacity-30 group-hover:opacity-100 italic transition-opacity">
            {{ proy.categoria }}
          </span>

          <div class="flex gap-2 flex-wrap justify-start md:justify-end max-w-full md:max-w-[200px]">
            @for (tag of proy.tags; track tag) {
              <span class="text-[7px] md:text-[8px] tracking-widest font-mono text-white/40 border border-white/10 px-2 py-0.5 rounded-sm uppercase group-hover:text-white group-hover:border-white/30 transition-all">
                {{ tag }}
              </span>
            }
          </div>
        </div>

        <div
          class="hidden lg:block absolute right-[5%] xl:right-[15%] top-1/2 -translate-y-1/2 w-[400px] xl:w-[500px] h-[250px] xl:h-[300px] opacity-0 scale-90 group-hover:opacity-100 group-hover:scale-100 transition-all duration-700 ease-out pointer-events-none z-20 rounded-2xl overflow-hidden border border-white/10 shadow-[0_0_50px_rgba(0,0,0,0.5)] bg-black"
        >
          <div class="absolute top-0 w-full h-6 bg-[#1a1a1a] flex items-center px-3 gap-1.5 z-30">
            <div class="w-2 h-2 rounded-full bg-red-500/50"></div>
            <div class="w-2 h-2 rounded-full bg-yellow-500/50"></div>
            <div class="w-2 h-2 rounded-full bg-green-500/50"></div>
          </div>

          <iframe
            [src]="proy.url | safe"
            class="w-[800px] xl:w-[1000px] h-[500px] xl:h-[600px] origin-top-left scale-50 border-none pt-6 pointer-events-none"
          >
          </iframe>
        </div>
      </a>
    }
  </div>
  
  </section>
